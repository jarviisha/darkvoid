# Production: pull pre-built image from ghcr.io
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Requires production secrets in .env or the shell.

x-redis-command: &redis-command
  - sh
  - -c
  - |
    if [ -n "$$REDIS_PASSWORD" ]; then
      exec redis-server --requirepass "$$REDIS_PASSWORD"
    fi
    exec redis-server

x-redis-healthcheck: &redis-healthcheck
  test:
    [
      "CMD-SHELL",
      'if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping; else redis-cli ping; fi',
    ]
  interval: 5s
  timeout: 5s
  retries: 10

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-darkvoid}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-darkvoid}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: *redis-command
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck: *redis-healthcheck

  migrate-user:
    image: migrate/migrate:4
    restart: on-failure
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations/user",
        "-database",
        "postgres://${DB_USER:-postgres}:${DB_PASSWORD:?set DB_PASSWORD in .env}@postgres:5432/${DB_NAME:-darkvoid}?sslmode=disable&x-migrations-table=schema_migrations_user",
        "up",
      ]
    depends_on:
      postgres:
        condition: service_healthy

  migrate-post:
    image: migrate/migrate:4
    restart: on-failure
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations/post",
        "-database",
        "postgres://${DB_USER:-postgres}:${DB_PASSWORD:?set DB_PASSWORD in .env}@postgres:5432/${DB_NAME:-darkvoid}?sslmode=disable&x-migrations-table=schema_migrations_post",
        "up",
      ]
    depends_on:
      migrate-user:
        condition: service_completed_successfully

  migrate-notification:
    image: migrate/migrate:4
    restart: on-failure
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations/notification",
        "-database",
        "postgres://${DB_USER:-postgres}:${DB_PASSWORD:?set DB_PASSWORD in .env}@postgres:5432/${DB_NAME:-darkvoid}?sslmode=disable&x-migrations-table=schema_migrations_notification",
        "up",
      ]
    depends_on:
      migrate-post:
        condition: service_completed_successfully

  app:
    image: ghcr.io/foxhathetoan/darkvoid:latest
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    env_file:
      - path: .env
        required: false
    environment:
      # App
      ENVIRONMENT: ${ENVIRONMENT:-production}

      # Database — points to the postgres container
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      DB_NAME: ${DB_NAME:-darkvoid}
      DB_SSLMODE: disable

      # Redis — points to the redis container
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-10}

      # JWT
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}

      # Storage
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      STORAGE_BASE_URL: ${STORAGE_BASE_URL:-http://localhost:8080/static}
      STORAGE_LOCAL_DIR: /app/uploads

      # Mailer
      MAILER_PROVIDER: ${MAILER_PROVIDER:-nop}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      migrate-notification:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads:
