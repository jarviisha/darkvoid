version: "2"
sql:
  # User Module - schema: usr
  - name: "user"
    engine: "postgresql"
    queries:
      - "internal/feature/user/sql/user_queries.sql"
      - "internal/feature/user/sql/refresh_token_queries.sql"
      - "internal/feature/user/sql/role_queries.sql"
      - "internal/feature/user/sql/user_role_queries.sql"
      - "internal/feature/user/sql/follow_queries.sql"
      - "internal/feature/user/sql/email_token_queries.sql"
    schema: "migrations/user/*.up.sql"
    gen:
      go:
        package: "db"
        out: "internal/feature/user/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"

  # Post Module - schema: post
  - name: "post"
    engine: "postgresql"
    queries:
      - "internal/feature/post/sql/post_queries.sql"
      - "internal/feature/post/sql/media_queries.sql"
      - "internal/feature/post/sql/like_queries.sql"
      - "internal/feature/post/sql/comment_queries.sql"
      - "internal/feature/post/sql/comment_like_queries.sql"
      - "internal/feature/post/sql/comment_media_queries.sql"
      - "internal/feature/post/sql/comment_mention_queries.sql"
      - "internal/feature/post/sql/hashtag_queries.sql"
      - "internal/feature/post/sql/mention_queries.sql"
    schema:
      - "migrations/user/*.up.sql"
      - "migrations/post/*.up.sql"
    gen:
      go:
        package: "db"
        out: "internal/feature/post/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        omit_unused_structs: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"

  # Notification Module - schema: notification
  - name: "notification"
    engine: "postgresql"
    queries:
      - "internal/feature/notification/sql/notification_queries.sql"
    schema:
      - "migrations/user/*.up.sql"
      - "migrations/notification/*.up.sql"
    gen:
      go:
        package: "db"
        out: "internal/feature/notification/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
