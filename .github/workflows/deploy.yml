name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_DIR: darkvoid

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run vet
        run: go vet ./...

      # - name: Run tests
      #   run: go test -race ./...

  build-and-push:
    if: false
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    # Temporarily disabled. Re-enable by removing this condition.
    if: false
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose and migrations to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.prod.yml,migrations/**"
          target: $HOME/${{ env.DEPLOY_DIR }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd $HOME/darkvoid

            # Login to GitHub Container Registry
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull

            # Load .env (if present) so DB_* vars match the postgres service
            if [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi
            DB_USER="${DB_USER:-postgres}"
            DB_NAME="${DB_NAME:-darkvoid}"
            : "${DB_PASSWORD:?DB_PASSWORD must be set on the server before deploy}"

            # Bring up postgres first so migrations can run
            docker compose -f docker-compose.prod.yml up -d postgres redis

            # Run migrations for each module (separate migration tables)
            for module in user post notification; do
              echo "Running $module migrations..."
              docker compose -f docker-compose.prod.yml run --rm migrate \
                -path=/migrations/$module \
                -database "postgres://$DB_USER:$DB_PASSWORD@postgres:5432/$DB_NAME?sslmode=disable&x-migrations-table=schema_migrations_$module" \
                up
            done

            # Start app (and any remaining services)
            docker compose -f docker-compose.prod.yml up -d

            # Cleanup old images
            docker image prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd $HOME/darkvoid

            echo "Waiting for all containers to be healthy..."
            timeout 120 bash -c '
              while true; do
                UNHEALTHY=$(docker compose -f docker-compose.prod.yml ps --format json | grep -c -v '"'"'"healthy"'"'"' || true)
                TOTAL=$(docker compose -f docker-compose.prod.yml ps --format json | wc -l)
                HEALTHY=$((TOTAL - UNHEALTHY))
                echo "  $HEALTHY/$TOTAL healthy"
                if [ "$UNHEALTHY" -eq 0 ] && [ "$TOTAL" -gt 0 ]; then
                  break
                fi
                sleep 5
              done
            '

            echo ""
            echo "=== Container Status ==="
            docker compose -f docker-compose.prod.yml ps

            echo ""
            echo "=== Health Check ==="
            curl -sf http://localhost:${SERVER_PORT:-8080}/health

            echo ""
            echo "Deployment verified successfully."
