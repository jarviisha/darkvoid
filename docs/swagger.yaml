        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
        "401":
          description: Missing refresh token cookie (web clients)
          schema:
            $ref: '#/definitions/errors.ErrorResponse'
        "500":
