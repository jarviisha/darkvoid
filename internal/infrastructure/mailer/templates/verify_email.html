<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Verify your email</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #0d1117; color: #c9d1d9; padding: 40px 20px;">
  <div style="max-width: 560px; margin: 0 auto; background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 32px;">
    <h1 style="color: #58a6ff; margin-top: 0;">Verify your email</h1>
    <p>Hi <strong>{{.Username}}</strong>,</p>
    <p>Please click the button below to verify your email address.</p>
    <div style="text-align: center; margin: 32px 0;">
      <a href="{{.VerifyURL}}" style="display: inline-block; background-color: #238636; color: #ffffff; text-decoration: none; padding: 12px 32px; border-radius: 6px; font-weight: 600;">Verify Email</a>
    </div>
    <p style="font-size: 13px; color: #8b949e;">Or copy and paste this link into your browser:</p>
    <p style="font-size: 13px; color: #58a6ff; word-break: break-all;">{{.VerifyURL}}</p>
    <p style="font-size: 13px; color: #8b949e;">This link expires in {{.ExpiresIn}}.</p>
    <hr style="border: none; border-top: 1px solid #30363d; margin: 24px 0;">
    <p style="font-size: 13px; color: #8b949e;">If you did not request this, please ignore this email.</p>
  </div>
</body>
</html>
